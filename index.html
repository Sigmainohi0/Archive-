<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Archive — Historical Photo Repository</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Libre+Baskerville:wght@400;700&display=swap');
[data-theme="dark"]{--bg:#0e0f11;--surface:#15171a;--surface2:#1c1f23;--surface3:#23272d;--border:#2c3038;--border2:#383e48;--text:#edeef0;--text2:#8a919e;--text3:#4e5562;--accent:#b59a5a;--accent-h:#cdb470;--accent2:#c0392b;--shadow:0 4px 24px rgba(0,0,0,.55);--shadow-hover:0 8px 32px rgba(0,0,0,.75)}
[data-theme="light"]{--bg:#f4f2ee;--surface:#fff;--surface2:#f9f8f5;--surface3:#eeecea;--border:#dedad4;--border2:#c8c3ba;--text:#1a1a1a;--text2:#555050;--text3:#999490;--accent:#8c6d2f;--accent-h:#6e5220;--accent2:#b03020;--shadow:0 2px 16px rgba(0,0,0,.08);--shadow-hover:0 6px 24px rgba(0,0,0,.14)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .2s,color .2s}
.topbar{position:sticky;top:0;z-index:200;background:var(--surface);border-bottom:1px solid var(--border)}
.topbar-inner{max-width:1440px;margin:0 auto;padding:0 16px;height:52px;display:flex;align-items:center;gap:10px}
.logo{font-family:'Libre Baskerville',serif;font-weight:700;font-size:16px;color:var(--text);white-space:nowrap;flex-shrink:0}
.logo span{color:var(--accent)}
.search-wrap{flex:1;max-width:420px;position:relative}
.search-wrap input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 12px 7px 36px;border-radius:4px;font-size:16px;font-family:Inter,sans-serif;outline:none;transition:border-color .15s}
.search-wrap input::placeholder{color:var(--text3)}
.search-wrap input:focus{border-color:var(--accent)}
.s-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:6px;flex-shrink:0}
.theme-toggle{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:6px 9px;cursor:pointer;font-size:14px;line-height:1;transition:background .15s}
.theme-toggle:hover{background:var(--surface3)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 16px;border-radius:4px;font-size:11px;font-weight:600;font-family:Inter,sans-serif;cursor:pointer;border:none;letter-spacing:.05em;text-transform:uppercase;transition:background .15s;white-space:nowrap}
.btn-accent{background:var(--accent);color:#0e0f11}
.btn-accent:hover{background:var(--accent-h)}
.btn-ghost{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--surface3);color:var(--text)}
.btn-danger{background:rgba(192,57,43,.1);color:var(--accent2);border:1px solid rgba(192,57,43,.25)}
.btn-danger:hover{background:rgba(192,57,43,.2)}
.btn-sm{padding:5px 11px}
.layout{max-width:1440px;margin:0 auto;padding:0 24px;display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 52px)}
/* SIDEBAR */
.sidebar{border-right:1px solid var(--border);padding:20px 0;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.sidebar-label{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);padding:0 18px 8px}
.sidebar-section{margin-bottom:24px}
.person-item{display:flex;align-items:center;justify-content:space-between;padding:8px 18px;cursor:pointer;border-left:3px solid transparent;gap:8px;transition:background .1s}
.person-item:hover{background:var(--surface2)}
.person-item.active{background:var(--surface2);border-left-color:var(--accent)}
.person-item-name{font-size:13px;font-weight:500;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.person-item.active .person-item-name{color:var(--accent)}
.person-count{font-size:10px;color:var(--text3);background:var(--surface3);padding:2px 6px;border-radius:20px;flex-shrink:0}
.album-list{border-left:1px solid var(--border);margin:2px 0 6px 30px}
.album-item{display:flex;align-items:center;padding:6px 12px;cursor:pointer;gap:6px;transition:background .1s;border-radius:0 4px 4px 0}
.album-item:hover{background:var(--surface2)}
.album-item.active{background:var(--surface2)}
.album-item-name{font-size:12px;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.album-item.active .album-item-name{color:var(--accent);font-weight:600}
.album-item-count{font-size:10px;color:var(--text3);flex-shrink:0}
.album-del-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:0 2px;opacity:0;transition:opacity .1s,color .1s;flex-shrink:0;line-height:1}
.album-item:hover .album-del-btn{opacity:1}
.album-del-btn:hover{color:var(--accent2)}
.sidebar-add-btn{width:calc(100% - 36px);margin:0 18px;display:flex;align-items:center;justify-content:center;gap:5px;padding:7px;border:1px dashed var(--border2);border-radius:4px;cursor:pointer;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);background:none;transition:border-color .15s,color .15s;font-family:Inter,sans-serif}
.sidebar-add-btn:hover{border-color:var(--accent);color:var(--accent)}
/* CONTENT */
.content{padding:24px 28px 80px;min-width:0}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text3);margin-bottom:16px}
.bc-person{color:var(--text2);cursor:pointer}
.bc-person:hover{color:var(--accent)}
.bc-album{color:var(--accent);font-weight:600}
.subject-hero{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:4px;padding:20px 24px;margin-bottom:20px;display:flex;align-items:flex-start;justify-content:space-between;gap:20px}
.hero-eyebrow{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:4px}
.hero-name{font-family:'Libre Baskerville',serif;font-size:clamp(20px,2.5vw,30px);font-weight:700;line-height:1.1;margin-bottom:3px}
.hero-dates{font-size:12px;color:var(--text3);margin-bottom:10px}
.hero-desc{font-size:13px;line-height:1.7;color:var(--text2);max-width:580px}
.hero-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0}
.stat-pill{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:8px 14px;text-align:center;min-width:80px}
.stat-num{font-family:'Libre Baskerville',serif;font-size:22px;font-weight:700;color:var(--accent);line-height:1}
.stat-label{font-size:9px;color:var(--text3);margin-top:3px;text-transform:uppercase;letter-spacing:.08em}
/* ALBUM TABS */
.album-tabs-bar{display:flex;align-items:center;border-bottom:2px solid var(--border);margin-bottom:20px;overflow-x:auto;scrollbar-width:none}
.album-tabs-bar::-webkit-scrollbar{display:none}
.album-tab{padding:9px 18px;font-size:12px;font-weight:600;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;letter-spacing:.03em;transition:color .15s,border-color .15s;background:none;border-top:none;border-left:none;border-right:none;font-family:Inter,sans-serif}
.album-tab:hover{color:var(--text2)}
.album-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.add-tab-btn{padding:9px 14px;font-size:18px;color:var(--text3);cursor:pointer;background:none;border:none;transition:color .15s;margin-left:4px;line-height:1}
.add-tab-btn:hover{color:var(--accent)}
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.toolbar-left{flex:1}
.toolbar-right{display:flex;gap:6px}
.view-toggle{display:flex;gap:2px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px}
.view-btn{padding:4px 8px;border-radius:3px;border:none;background:none;cursor:pointer;font-size:13px;color:var(--text3);transition:background .12s,color .12s;font-family:Inter,sans-serif;font-size:11px;font-weight:600;letter-spacing:.03em}
.view-btn.active{background:var(--surface);color:var(--text)}
/* 1x1 view */
.photo-grid.single-view{grid-template-columns:1fr;gap:28px;max-width:640px;margin:0 auto}
.photo-grid.single-view .card-img,.photo-grid.single-view .card-vid{aspect-ratio:unset}
.photo-grid.single-view .card-img img,.photo-grid.single-view .card-vid video{max-height:65vh;object-fit:contain;background:#000;width:100%}
.photo-grid.single-view .card-body{padding:14px 16px 18px}
.photo-grid.single-view .card-title{font-size:15px;white-space:normal;font-family:'Libre Baskerville',serif}
.photo-grid.single-view .card-desc{-webkit-line-clamp:unset;font-size:13px;line-height:1.7;color:var(--text2)}
/* SWIPE OVERLAY */
.swipe-overlay{display:none;position:fixed;inset:0;background:#000;z-index:600;flex-direction:column;overflow:hidden;touch-action:pan-y}
.swipe-overlay.open{display:flex}
.swipe-track{display:flex;flex-direction:column;transition:transform .3s cubic-bezier(.25,.46,.45,.94);will-change:transform}
.swipe-slide{width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;position:relative}
.swipe-slide img{max-width:100%;max-height:80vh;object-fit:contain;display:block}
.swipe-slide video{max-width:100%;max-height:80vh;display:block;outline:none}
.swipe-info{position:absolute;bottom:0;left:0;right:0;padding:20px 20px 44px;background:linear-gradient(to top,rgba(0,0,0,.85) 0%,rgba(0,0,0,.4) 60%,transparent 100%)}
.swipe-title{color:#fff;font-size:16px;font-weight:700;font-family:Inter,sans-serif;margin-bottom:4px}
.swipe-desc{color:rgba(255,255,255,.8);font-size:13px;font-family:Inter,sans-serif;line-height:1.5;margin-bottom:5px;max-height:60px;overflow-y:auto}
.swipe-meta{color:rgba(255,255,255,.5);font-size:11px;font-family:Inter,sans-serif}
.swipe-counter{position:absolute;top:16px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.5);font-size:12px;font-family:Inter,sans-serif;background:rgba(0,0,0,.4);padding:4px 12px;border-radius:20px;backdrop-filter:blur(4px)}
.swipe-close{position:absolute;top:12px;right:16px;background:rgba(255,255,255,.1);border:none;border-radius:8px;color:#fff;font-size:16px;cursor:pointer;padding:6px 10px;line-height:1;backdrop-filter:blur(4px);z-index:10}
.swipe-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:rgba(255,255,255,.3);font-size:13px;font-family:Inter,sans-serif;pointer-events:none;animation:fadeout 2s forwards 1.5s}
@keyframes fadeout{to{opacity:0}}
.upload-zone{border:2px dashed var(--border2);border-radius:4px;padding:28px;text-align:center;cursor:pointer;transition:all .15s;margin-bottom:20px;background:var(--surface)}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:rgba(181,154,90,.03)}
.uz-icon{font-size:24px;margin-bottom:6px;opacity:.4}
.uz-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:3px}
.uz-sub{font-size:11px;color:var(--text3)}
/* GRID */
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px}
.photo-grid.list-view{grid-template-columns:1fr;gap:8px}
.photo-card{background:var(--surface);border:1px solid var(--border);border-radius:4px;overflow:hidden;cursor:pointer;transition:box-shadow .2s,transform .15s,border-color .15s;position:relative;user-select:none;-webkit-user-select:none}
.photo-card:hover{box-shadow:var(--shadow-hover);transform:translateY(-2px);border-color:var(--border2)}
.photo-card.selected{border-color:var(--accent2);box-shadow:0 0 0 2px var(--accent2)}
.photo-card.selected .select-check{display:flex}
.photo-card.drag-over{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent);transform:scale(1.03)}
/* select circle */
.card-select-btn{position:absolute;top:7px;right:7px;width:26px;height:26px;border-radius:50%;background:rgba(0,0,0,.45);border:2px solid rgba(255,255,255,.6);cursor:pointer;z-index:10;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);transition:background .15s,border-color .15s;flex-shrink:0}
.photo-grid.select-mode .card-select-btn{display:flex}
.photo-card.selected .card-select-btn{background:var(--accent2);border-color:var(--accent2)}
.card-select-btn-inner{width:10px;height:10px;border-radius:50%;background:transparent;transition:background .15s}
.photo-card.selected .card-select-btn-inner{background:#fff}
.select-check{display:none;position:absolute;top:8px;left:8px;width:24px;height:24px;background:var(--accent2);border-radius:50%;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;z-index:10;pointer-events:none}
/* select mode toolbar */
.select-bar{display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 20px;gap:12px;align-items:center;box-shadow:var(--shadow);z-index:300;white-space:nowrap}
.select-bar.show{display:flex}
.select-bar-label{font-size:13px;font-weight:600;color:var(--text)}
/* shake animation when entering select mode */
@keyframes shake{0%,100%{transform:rotate(0deg)}25%{transform:rotate(-2deg)}75%{transform:rotate(2deg)}}
.photo-grid.select-mode .photo-card{animation:shake .3s ease}
.card-img{aspect-ratio:4/3;overflow:hidden;background:var(--surface3);position:relative}
.card-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.photo-card:hover .card-img img{transform:scale(1.04)}
.card-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.65) 0%,transparent 55%);opacity:0;transition:opacity .2s;display:flex;align-items:flex-end;padding:8px;gap:5px}
.photo-card:hover .card-overlay{opacity:1}
.ov-btn{padding:4px 9px;border-radius:3px;font-size:11px;font-weight:600;cursor:pointer;border:none;font-family:Inter,sans-serif}
.ov-edit{background:rgba(255,255,255,.15);color:#fff;backdrop-filter:blur(4px)}
.ov-edit:hover{background:rgba(255,255,255,.25)}
.ov-del{background:rgba(192,57,43,.3);color:#ff9999;backdrop-filter:blur(4px)}
.ov-del:hover{background:rgba(192,57,43,.5)}
.card-body{padding:10px 12px 12px}
.card-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-desc{font-size:11px;color:var(--text2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:6px}
.card-foot{display:flex;justify-content:space-between;align-items:center}
.card-date{font-size:10px;color:var(--text3)}
.card-badge{font-size:9px;color:var(--accent);background:rgba(181,154,90,.1);padding:1px 6px;border-radius:10px;border:1px solid rgba(181,154,90,.2)}
.photo-grid.list-view .photo-card{display:flex}
.photo-grid.list-view .card-img{aspect-ratio:unset;width:110px;flex-shrink:0}
.photo-grid.list-view .card-body{flex:1;padding:14px 16px;display:flex;flex-direction:column;gap:3px}
.photo-grid.list-view .card-title{white-space:normal;font-size:13px}
.photo-grid.list-view .card-desc{-webkit-line-clamp:3}
.card-vid{aspect-ratio:4/3;overflow:hidden;background:#000;position:relative}
.card-vid video{width:100%;height:100%;object-fit:cover;display:block}
.play-badge{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:44px;height:44px;background:rgba(0,0,0,.6);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;pointer-events:none;color:#fff}
.photo-card:hover .play-badge{background:rgba(181,154,90,.85)}
.vid-badge{position:absolute;top:7px;right:7px;background:rgba(0,0,0,.7);color:#fff;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:2px 6px;border-radius:3px}
.empty-icon{font-size:40px;opacity:.15;margin-bottom:10px}
.empty-title{font-size:15px;font-weight:600;color:var(--text2);margin-bottom:5px}
.empty-sub{font-size:12px;color:var(--text3)}
/* LIGHTBOX */
.lb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:500;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.lb-overlay.open{display:flex}
.lb-inner{background:var(--surface);border:1px solid var(--border);border-radius:4px;display:grid;grid-template-columns:1fr 320px;width:100%;max-width:960px;max-height:92vh;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.6)}
.lb-img-pane{background:#000;display:flex;align-items:center;justify-content:center;min-height:200px;overflow:hidden;max-height:92vh}
.lb-img-pane img{max-width:100%;max-height:92vh;object-fit:contain;display:block}
.lb-side{border-left:1px solid var(--border);padding:24px 20px;overflow-y:scroll;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;gap:14px;max-height:92vh}
.lb-close{position:absolute;top:14px;right:18px;background:rgba(255,255,255,.1);border:none;border-radius:4px;color:#fff;font-size:16px;cursor:pointer;padding:5px 9px;line-height:1;z-index:10}
.lb-close:hover{background:rgba(255,255,255,.2)}
.lb-sec-title{font-family:'Libre Baskerville',serif;font-size:14px;font-weight:700;color:var(--text);border-bottom:1px solid var(--border);padding-bottom:10px}
.lbf label{display:block;font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
.lbf input,.lbf textarea,.lbf select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:7px 10px;font-family:Inter,sans-serif;font-size:12px;color:var(--text);outline:none;transition:border-color .15s}
.lbf textarea{resize:vertical;min-height:70px}
.lbf select option,.mf select option{background:var(--surface2)}
.lbf input:focus,.lbf textarea:focus,.lbf select:focus{border-color:var(--accent)}
.lbf input::placeholder,.lbf textarea::placeholder{color:var(--text3)}
.lb-actions{display:flex;gap:7px;margin-top:auto;flex-wrap:wrap}
/* MODALS */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:400;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:28px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.modal-title{font-family:'Libre Baskerville',serif;font-size:18px;font-weight:700;margin-bottom:20px;color:var(--text)}
.mf{margin-bottom:14px}
.mf label{display:block;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:5px}
.mf input,.mf textarea,.mf select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:9px 12px;font-family:Inter,sans-serif;font-size:13px;color:var(--text);outline:none;transition:border-color .15s}
.mf textarea{resize:vertical;min-height:80px}
.mf input:focus,.mf textarea:focus,.mf select:focus{border-color:var(--accent)}
.mf input::placeholder,.mf textarea::placeholder{color:var(--text3)}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.divider{display:flex;align-items:center;gap:10px;color:var(--text3);font-size:11px;margin:4px 0 12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.new-alb-row{display:flex;gap:8px;align-items:center}
.new-alb-row input{flex:1}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:background .3s}
.sync-dot.synced{background:#4ade80}
.sync-dot.syncing{background:var(--accent);animation:pulse 1s infinite}
.sync-dot.error{background:var(--accent2)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
/* album tab delete */
.album-tab-wrap{display:inline-flex;align-items:center;gap:0;border-bottom:2px solid transparent;margin-bottom:-2px}
.album-tab-wrap.active{border-bottom-color:var(--accent)}
.album-tab-wrap .album-tab{border-bottom:none;margin-bottom:0}
.album-tab-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:0 6px 0 2px;line-height:1;opacity:0;transition:opacity .15s,color .15s;margin-bottom:-2px}
.album-tab-wrap:hover .album-tab-del{opacity:1}
.album-tab-del:hover{color:var(--accent2)}
/* stats panel */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:16px;text-align:center}
.stat-card-num{font-family:'Libre Baskerville',serif;font-size:28px;font-weight:700;color:var(--accent);line-height:1}

function setSyncStatus(st, label) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  if (dot) dot.className = 'sync-dot ' + st;
  if (lbl) lbl.textContent = label;
}

function saveToCloud() {
  setSyncStatus('syncing', 'saving...');
  localStorage.setItem(KEY, JSON.stringify(state));
  const blob = new Blob([JSON.stringify(state)], {type:'application/json'});
  const headers = {'Authorization':'Bearer '+SB_KEY,'apikey':SB_KEY,'Content-Type':'application/json','x-upsert':'true'};
  fetch(SB_URL+'/storage/v1/object/'+BUCKET+'/'+META, {method:'POST',headers:headers,body:blob})
    .then(function(r){ setSyncStatus('synced','saved \u2713'); })
    .catch(function(){ setSyncStatus('error','sync failed'); });
}

function ensureDefaultPeople() {
  var defaults = defaultData().people;
  defaults.forEach(function(def) {
    var existing = null;
    for (var i=0; i<state.people.length; i++) {
      if (state.people[i].id === def.id) { existing = state.people[i]; break; }
    }
    // If person missing entirely, add them back
    if (!existing) {
      state.people.unshift(def);
    } else {
      // Person exists — restore any missing default albums (keep their photos intact)
      def.albums.forEach(function(defAlb) {
        var albExists = false;
        for (var j=0; j<existing.albums.length; j++) {
          if (existing.albums[j].id === defAlb.id) { albExists = true; break; }
        }
        if (!albExists) {
          existing.albums.push({ id: defAlb.id, name: defAlb.name });
        }
      });
    }
  });
  if (!state.activePersonId || !person(state.activePersonId)) {
    state.activePersonId = state.people[0].id;
  }
}

function loadFromCloud(cb) {
  setSyncStatus('syncing','syncing...');
  fetch(SB_URL+'/storage/v1/object/public/'+BUCKET+'/'+META+'?t='+Date.now())
    .then(function(r){ return r.ok ? r.json() : null; })
    .then(function(data){
      if (data && data.people) {
        state = data;
        state.people.forEach(function(p){ if(!p.albums)p.albums=[]; if(!p.photos)p.photos=[]; });
        ensureDefaultPeople();
        localStorage.setItem(KEY, JSON.stringify(state));
        setSyncStatus('synced','synced');
        cb(true);
      } else { setSyncStatus('synced','ready'); cb(false); }
    })
    .catch(function(){ setSyncStatus('synced','ready'); cb(false); });
}

          { id: 'ah-downfall', name: 'The Downfall' }
        ],
        photos: []
      }
    ]
  };
}

function loadState() {
  try { const r = localStorage.getItem(KEY); if (r) return JSON.parse(r); } catch(e) {}
  return defaultData();
}
function save() { saveToCloud(); }

let state = loadState();
state.people.forEach(p => { if (!p.albums) p.albums = []; });
ensureDefaultPeople();

let lbPhotoId = null, lbPersonId = null, pendingFiles = [];

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function person(id) { return state.people.find(p => p.id === id); }
function alb(pid, aid) { return person(pid)?.albums.find(a => a.id === aid); }
function fmtDate(ts) { return ts ? new Date(ts).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}) : ''; }
function activePerson() { return person(state.activePersonId); }
function albCount(p, aid) { return p.photos.filter(ph => ph.albumId === aid).length; }

// ── THEME
function applyTheme() {
  document.documentElement.setAttribute('data-theme', state.theme);
  document.getElementById('theme-toggle').textContent = state.theme === 'dark' ? '☀️' : '🌙';
}
document.getElementById('theme-toggle').addEventListener('click', () => {
  state.theme = state.theme === 'dark' ? 'light' : 'dark'; save(); applyTheme();
});
applyTheme();

function renderMobileNav() {

// ── SIDEBAR

  const list = document.getElementById('person-list');
  list.innerHTML = state.people.map(p => {
    const isActive = p.id === state.activePersonId;

          <span class="album-item-count">${p.photos.length}</span>

        ${p.albums.map(a => `

            <span class="album-item-count">${albCount(p,a.id)}</span>

  return `
  <div class="photo-card" data-cph="${ph.id}">

// ── UPLOAD MODAL
function buildPersonSel(defPersonId) {
  const sel = document.getElementById('upload-person-select');
  sel.innerHTML = state.people.map(function(p) {
    return '<option value="' + p.id + '"' + (p.id === defPersonId ? ' selected' : '') + '>' + p.name + '</option>';
  }).join('');
  sel.value = defPersonId || state.activePersonId;
}

function buildAlbSel(selId, personId, defAlbId) {
  const p = person(personId) || activePerson();
  const sel = document.getElementById(selId);
  let html = '<option value="uncategorized">\u2014 Uncategorized \u2014</option>';
  p.albums.forEach(function(a) {
    html += '<option value="' + a.id + '"' + (a.id === defAlbId ? ' selected' : '') + '>' + a.name + '</option>';
  });
  sel.innerHTML = html;
  if (defAlbId && defAlbId !== 'all' && defAlbId !== 'uncategorized') sel.value = defAlbId;
}

function openUploadModal(defAlbId) {
  pendingFiles = [];
  document.getElementById('upload-modal-title').textContent = 'Add Media';
  document.getElementById('upload-new-album').value = '';
  document.getElementById('upload-file-list').textContent = '';
  const defPersonId = state.activePersonId;
  buildPersonSel(defPersonId);
  buildAlbSel('upload-album-select', defPersonId, defAlbId);
  document.getElementById('modal-upload').classList.add('open');
}

// When person changes in modal, reload albums
document.getElementById('upload-person-select').addEventListener('change', function() {
  buildAlbSel('upload-album-select', this.value, null);
});
function openUploadModalWithFiles(files, defAlbId) {
  openUploadModal(defAlbId);
  pendingFiles = Array.from(files).filter(f => f.type.startsWith('image/'));
  updateFL();
}
function updateFL() {
  const el = document.getElementById('upload-file-list');
  el.textContent = pendingFiles.length ? `${pendingFiles.length} file${pendingFiles.length!==1?'s':''} selected: ${pendingFiles.map(f=>f.name).join(', ')}` : '';
}
const mz = document.getElementById('modal-upload-zone');
mz.addEventListener('click', () => document.getElementById('file-input').click());
mz.addEventListener('dragover', e => { e.preventDefault(); mz.classList.add('drag'); });
mz.addEventListener('dragleave', () => mz.classList.remove('drag'));
mz.addEventListener('drop', e => { e.preventDefault(); mz.classList.remove('drag'); pendingFiles = Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/')||f.type.startsWith('video/')); updateFL(); });

document.getElementById('upload-create-album-btn').addEventListener('click', () => {
  const name = document.getElementById('upload-new-album').value.trim(); if (!name) return;
  const selectedPersonId = document.getElementById('upload-person-select').value;
  const p = person(selectedPersonId) || activePerson();
  const na = { id: 'alb-'+uid(), name };
  p.albums.push(na);
  document.getElementById('upload-new-album').value = '';
  buildAlbSel('upload-album-select', selectedPersonId, na.id);
  save(); renderSidebar(); renderMobileNav();
  showToast('Album "' + name + '" created');
});
document.getElementById('upload-cancel').addEventListener('click', () => { document.getElementById('modal-upload').classList.remove('open'); pendingFiles = []; });
document.getElementById('upload-confirm').addEventListener('click', () => {
  if (!pendingFiles.length) { mz.click(); return; }
  const selectedPersonId = document.getElementById('upload-person-select').value;
  const albumId = document.getElementById('upload-album-select').value;
  processFiles(pendingFiles, selectedPersonId, albumId);
  document.getElementById('modal-upload').classList.remove('open'); pendingFiles = [];
});
document.getElementById('top-upload-btn').addEventListener('click', () => openUploadModal(state.activeAlbumId));
document.getElementById('file-input').addEventListener('change', e => {
  const files = Array.from(e.target.files).filter(f => f.type.startsWith('image/') || f.type.startsWith('video/')); e.target.value = '';
  if (document.getElementById('modal-upload').classList.contains('open')) { pendingFiles = files; updateFL(); }
  else processFiles(files, state.activePersonId, state.activeAlbumId === 'all' ? 'uncategorized' : state.activeAlbumId);
});
function processFiles(files, pid, aid) {
  const p = person(pid); if (!p || !files.length) return;
  let done = 0;
  files.forEach(f => {
    const ext = f.name.split('.').pop();
    const path = pid + '/' + uid() + '.' + ext;
    const headers = {'Authorization':'Bearer '+SB_KEY,'apikey':SB_KEY,'Content-Type':f.type,'x-upsert':'true'};
    fetch(SB_URL+'/storage/v1/object/'+BUCKET+'/'+path, {method:'POST',headers:headers,body:f})
      .then(function(r) {
        if (r.ok) {
          const url = SB_URL+'/storage/v1/object/public/'+BUCKET+'/'+path;
          p.photos.unshift({ id: uid(), dataUrl: url, isVideo: f.type.startsWith('video/'), albumId: aid||'uncategorized', title: '', desc: '', year: '', source: '', added: Date.now() });
          done++;
          if (done === files.length) { save(); renderSidebar(); renderContent(); }
        } else { readLocal(f); }
      }).catch(function(){ readLocal(f); });

    function readLocal(file) {
      const r = new FileReader();
      r.onload = e => {
        p.photos.unshift({ id: uid(), dataUrl: e.target.result, isVideo: file.type.startsWith('video/'), albumId: aid||'uncategorized', title: '', desc: '', year: '', source: '', added: Date.now() });
        done++;
        if (done === files.length) { save(); renderSidebar(); renderContent(); }
      };
      r.readAsDataURL(file);
    }
  });
}

// ── LIGHTBOX
function openLightbox(photoId, personId) {
  const p = person(personId); const ph = p.photos.find(x => x.id === photoId); if (!ph) return;
  lbPhotoId = photoId; lbPersonId = personId;
  const pane = document.getElementById('lb-media-pane');
  if (ph.isVideo) {
    pane.innerHTML = `<video src="${ph.dataUrl}" controls autoplay style="max-width:100%;max-height:80vh;display:block;outline:none"></video>`;
  } else {
    pane.innerHTML = `<img src="${ph.dataUrl}" alt="${ph.title||''}" style="max-width:100%;max-height:80vh;object-fit:contain;display:block">`;
  }
  document.getElementById('lb-title').value = ph.title||'';
  document.getElementById('lb-desc').value = ph.desc||'';
  document.getElementById('lb-year').value = ph.year||'';
  document.getElementById('lb-source').value = ph.source||'';
  const sel = document.getElementById('lb-album');
  sel.innerHTML = `<option value="uncategorized">— Uncategorized —</option>` +
    p.albums.map(a => `<option value="${a.id}"${a.id===ph.albumId?' selected':''}>${a.name}</option>`).join('');
  if (ph.albumId) sel.value = ph.albumId;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  const vid = document.querySelector('#lb-media-pane video');
  if (vid) { vid.pause(); vid.src = ''; }
  document.getElementById('lightbox').classList.remove('open'); lbPhotoId = null;
}
document.getElementById('lb-close').addEventListener('click', closeLightbox);
document.getElementById('lightbox').addEventListener('click', e => { if (e.target === document.getElementById('lightbox')) closeLightbox(); });
document.getElementById('lb-save').addEventListener('click', () => {
  if (!lbPhotoId) return;
  const p = person(lbPersonId); const ph = p.photos.find(x => x.id === lbPhotoId);
  ph.title = document.getElementById('lb-title').value;
  ph.desc = document.getElementById('lb-desc').value;
  ph.year = document.getElementById('lb-year').value;
  ph.source = document.getElementById('lb-source').value;
  ph.albumId = document.getElementById('lb-album').value;
  save(); closeLightbox(); renderSidebar(); renderContent();
});
document.getElementById('lb-delete').addEventListener('click', () => { if (!lbPhotoId) return; deletePhoto(lbPhotoId, lbPersonId); closeLightbox(); });
function deletePhoto(id, pid) { const p = person(pid); p.photos = p.photos.filter(ph => ph.id !== id); save(); renderSidebar(); renderContent(); }

document.getElementById('sidebar-add-person').addEventListener('click', () => {

let swipePhotos = [], swipeIndex = 0, swipePerson = null;
let swipeTouchStartY = 0, swipeDragging = false;

function openSwipeView(photos, p) {
  swipePhotos = photos; swipeIndex = 0; swipePerson = p;
  const track = document.getElementById('swipe-track');
  track.innerHTML = photos.map(function(ph, i) {
    const media = ph.isVideo
      ? '<video src="'+ph.dataUrl+'" '+(i===0?'autoplay':'')+' muted loop playsinline style="max-width:100%;max-height:80vh;display:block;outline:none"></video>'
      : '<img src="'+ph.dataUrl+'" style="max-width:100%;max-height:80vh;object-fit:contain;display:block;">';
    const hasInfo = ph.title || ph.desc || ph.year || ph.source;
    return '<div class="swipe-slide">'
      + media
      + (hasInfo ? '<div class="swipe-info">'
        + (ph.title ? '<div class="swipe-title">'+ph.title+'</div>' : '')
        + (ph.desc ? '<div class="swipe-desc">'+ph.desc+'</div>' : '')
        + ((ph.year||ph.source) ? '<div class="swipe-meta">'+(ph.year||'')+(ph.year&&ph.source?' · ':'')+(ph.source||'')+'</div>' : '')
        + '</div>' : '')
      + (i===0?'<div class="swipe-hint">Swipe up ↑</div>':'')
      + '</div>';
  }).join('');
  updateSwipePosition(false);
  updateSwipeCounter();
  document.getElementById('swipe-overlay').classList.add('open');
}

function updateSwipePosition(animate) {
  const track = document.getElementById('swipe-track');
  track.style.transition = animate ? 'transform .3s cubic-bezier(.25,.46,.45,.94)' : 'none';
  track.style.transform = 'translateY(-' + (swipeIndex * 100) + 'vh)';
  // autoplay current video, pause others
  const slides = track.querySelectorAll('.swipe-slide');
  slides.forEach(function(slide, i) {
    const vid = slide.querySelector('video');
    if (vid) { if (i === swipeIndex) { vid.play(); } else { vid.pause(); } }
  });
}

function updateSwipeCounter() {
  document.getElementById('swipe-counter').textContent = (swipeIndex+1) + ' / ' + swipePhotos.length;
}

function closeSwipeView() {
  document.getElementById('swipe-overlay').classList.remove('open');
  document.getElementById('swipe-track').querySelectorAll('video').forEach(function(v){ v.pause(); v.src=''; });
  document.getElementById('swipe-track').innerHTML = '';
}

document.getElementById('swipe-close').addEventListener('click', closeSwipeView);

// touch swipe
const swipeEl = document.getElementById('swipe-overlay');
swipeEl.addEventListener('touchstart', function(e) {
  swipeTouchStartY = e.touches[0].clientY;
  swipeDragging = true;
}, {passive:true});
swipeEl.addEventListener('touchend', function(e) {
  if (!swipeDragging) return;
  swipeDragging = false;
  const dy = swipeTouchStartY - e.changedTouches[0].clientY;
  if (dy > 40 && swipeIndex < swipePhotos.length - 1) {
    swipeIndex++; updateSwipePosition(true); updateSwipeCounter();
  } else if (dy < -40 && swipeIndex > 0) {
    swipeIndex--; updateSwipePosition(true); updateSwipeCounter();
  }
}, {passive:true});

// keyboard in swipe
document.addEventListener('keydown', function(e) {
  if (!document.getElementById('swipe-overlay').classList.contains('open')) return;
  if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
    if (swipeIndex < swipePhotos.length - 1) { swipeIndex++; updateSwipePosition(true); updateSwipeCounter(); }
  }
  if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
    if (swipeIndex > 0) { swipeIndex--; updateSwipePosition(true); updateSwipeCounter(); }
  }
  if (e.key === 'Escape') closeSwipeView();
});

let selectMode = false;

let dragId = null;

function enterSelectMode(id, cardEl) {

function exitSelectMode() {

  document.querySelectorAll('.photo-card.selected').forEach(c => c.classList.remove('selected'));

  const fab = document.getElementById('fab-select');
  if (fab) {
    fab.classList.remove('active');
    fab.innerHTML = '☑ <span>Select & Delete</span>';
  }
}

function toggleSelect(id, cardEl) {
  const idx = selectedIds.indexOf(id);
  if (idx === -1) { selectedIds.push(id); cardEl.classList.add('selected'); }
  else { selectedIds.splice(idx, 1); cardEl.classList.remove('selected'); }
  if (selectedIds.length === 0) exitSelectMode();
  else updateSelectUI();
}

function updateSelectUI() {
  document.getElementById('select-count').textContent = selectedIds.length + ' selected';
  document.getElementById('select-bar').classList.add('show');
  document.querySelectorAll('.photo-card').forEach(function(card) {
    const id = card.getAttribute('data-cph');
    if (selectedIds.indexOf(id) !== -1) card.classList.add('selected');
    else card.classList.remove('selected');
  });
}

function addLongPressToCards() {
  const cards = document.querySelectorAll('.photo-card');

  cards.forEach(function(card) {
    const id = card.getAttribute('data-cph');
    let pressTimer = null;
    let didLongPress = false;
    let startX = 0, startY = 0;

    card.addEventListener('touchstart', function(e) {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      didLongPress = false;

      pressTimer = setTimeout(function() {
        pressTimer = null;
        didLongPress = true;
        if (!selectMode) {
          enterSelectMode(id, card);
        } else {
          toggleSelect(id, card);
        }
      }, 550);
    }, { passive: true });

    card.addEventListener('touchmove', function(e) {
      const dx = e.touches[0].clientX - startX;
      const dy = e.touches[0].clientY - startY;
      if (Math.sqrt(dx*dx + dy*dy) > 8) {
        // finger moved — cancel long press
        if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
      }
    }, { passive: true });

    card.addEventListener('touchend', function() {
      if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
      // if long press fired, block the upcoming click event once
      if (didLongPress) {
        didLongPress = false;
        card.addEventListener('click', function stopClick(e) {
          e.stopImmediatePropagation();
          e.preventDefault();
          card.removeEventListener('click', stopClick);
        }, true);
      }
    }, { passive: true });

    // Desktop drag
    card.setAttribute('draggable', true);
    card.addEventListener('dragstart', function(e) {
      dragId = id;
      card.style.opacity = '0.4';
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', function() {
      card.style.opacity = '';
      document.querySelectorAll('.photo-card.drag-over').forEach(c => c.classList.remove('drag-over'));
    });
    card.addEventListener('dragover', function(e) {
      e.preventDefault();
      document.querySelectorAll('.photo-card.drag-over').forEach(c => c.classList.remove('drag-over'));
      if (card.getAttribute('data-cph') !== dragId) card.classList.add('drag-over');
    });
    card.addEventListener('drop', function(e) {
      e.preventDefault();
      const targetId = card.getAttribute('data-cph');
      if (targetId && targetId !== dragId) reorderPhotos(dragId, targetId);
    });

    // Normal tap — open lightbox or toggle select
    card.addEventListener('click', function(e) {
      if (selectMode) {
        e.stopPropagation();
        toggleSelect(id, card);
      }
    });
  });
}

function reorderPhotos(fromId, toId) {
  const p = activePerson(); if (!p) return;
  const fromIdx = p.photos.findIndex(ph => ph.id === fromId);
  const toIdx = p.photos.findIndex(ph => ph.id === toId);
  if (fromIdx === -1 || toIdx === -1) return;
  const [moved] = p.photos.splice(fromIdx, 1);
  p.photos.splice(toIdx, 0, moved);
  save(); renderContent();
  showToast('Reordered');
}

const SOCIAL_KEY = 'archive_social_v1';
let sfLoaded = false;
let sfPhotos = [], sfFilter = 'all', sfCurrentIdx = 0;
let sfSocial = (function(){ try { const r=localStorage.getItem(SOCIAL_KEY); if(r) return JSON.parse(r); } catch(e){} return {likes:{},username:null}; })();
function sfSave() { try { localStorage.setItem(SOCIAL_KEY, JSON.stringify(sfSocial)); } catch(e){} }

const SF_COLORS = ['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22','#e91e63'];
function sfColor(n) { let h=0; for(let i=0;i<n.length;i++) h=(h+n.charCodeAt(i))%SF_COLORS.length; return SF_COLORS[h]; }
function sfInit(n) { return n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }
function sfFmt(ts) { const d=Date.now()-ts; if(d<60000) return 'just now'; if(d<3600000) return Math.floor(d/60000)+'m'; if(d<86400000) return Math.floor(d/3600000)+'h'; return Math.floor(d/86400000)+'d'; }

function sfGetUsername() {
  if (sfSocial.username) return sfSocial.username;
  const name = prompt('Enter your name to like photos:');
  if (name && name.trim()) { sfSocial.username = name.trim(); sfSave(); return sfSocial.username; }
  return null;
}

function sfBuildFeed() {
  // build filter tabs from current people
  const tabs = document.getElementById('sf-filter-tabs');
  tabs.innerHTML = '<button class="sf-pill active" data-sf-filter="all">For You</button>'
    + state.people.map(p => '<button class="sf-pill" data-sf-filter="'+p.id+'">'+p.name.split(' ')[0]+'</button>').join('');
  tabs.querySelectorAll('.sf-pill').forEach(function(btn) {
    btn.addEventListener('click', function() {
      tabs.querySelectorAll('.sf-pill').forEach(function(b){ b.classList.remove('active'); });
      this.classList.add('active');
      sfFilter = this.getAttribute('data-sf-filter');
      sfCurrentIdx = 0;
      sfRenderFeed();
    });
  });
  sfRenderFeed();
}

function sfRenderFeed() {
  var all = [];
  state.people.forEach(function(person) {
    person.photos.forEach(function(photo) {
      all.push({ id:photo.id, dataUrl:photo.dataUrl, isVideo:photo.isVideo||false,
        title:photo.title||'', desc:photo.desc||'', year:photo.year||'', source:photo.source||'',
        albumId:photo.albumId||'', added:photo.added||0,
        personId:person.id, personName:person.name, personAlbums:person.albums||[] });
    });
  });
  if (sfFilter !== 'all') all = all.filter(function(p){ return p.personId === sfFilter; });
  // shuffle
  for (var i=all.length-1; i>0; i--) { var j=Math.floor(Math.random()*(i+1)); var t=all[i]; all[i]=all[j]; all[j]=t; }
  sfPhotos = all;

  var feed = document.getElementById('sf-feed');
  if (!sfPhotos.length) {
    feed.innerHTML = '<div style="height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:rgba(255,255,255,.3);"><div style="font-size:48px;opacity:.2">📭</div><div style="font-size:15px;font-weight:600;">No photos yet</div><div style="font-size:13px;">Add photos in Archive mode first</div></div>';
    document.getElementById('sf-progress').innerHTML = '';
    sfUpdateNav();
    return;
  }
  feed.innerHTML = sfPhotos.map(function(ph,i){ return sfSlideHTML(ph,i); }).join('');
  feed.scrollTop = 0;
  sfCurrentIdx = 0;
  sfRenderDots();
  sfUpdateDots(0);
  sfUpdateNav();
  sfSetupVideoAutoplay();

  // EVENT DELEGATION on feed container — never re-add, always works
  feed.onclick = null;
  feed.onclick = function(e) {
    var likeBtn = e.target.closest('[data-sf-like]');
    if (likeBtn) { e.stopPropagation(); sfToggleLike(likeBtn.getAttribute('data-sf-like'), likeBtn); return; }
    var descEl = e.target.closest('.sf-desc');
    if (descEl) {
      descEl.classList.toggle('expanded');
      var sm = descEl.nextElementSibling;
      if (sm && sm.classList.contains('sf-see-more')) sm.textContent = descEl.classList.contains('expanded') ? 'less' : 'more';
    }
  };
}

function sfSlideHTML(ph, i) {
  var likes = (sfSocial.likes[ph.id]||[]).length;
  var isLiked = sfSocial.username && (sfSocial.likes[ph.id]||[]).indexOf(sfSocial.username) !== -1;
  var albObj = ph.albumId ? (ph.personAlbums||[]).find(function(a){ return a.id===ph.albumId; }) : null;
  var albName = albObj ? albObj.name : '';
  return '<div class="sf-slide" data-sfidx="'+i+'" data-sfid="'+ph.id+'">'
    + (ph.isVideo
        ? '<video class="sf-media" src="'+ph.dataUrl+'" muted loop playsinline preload="metadata"></video>'
        : '<img class="sf-media" src="'+ph.dataUrl+'" alt="'+ph.title+'" loading="'+(i<3?'eager':'lazy')+'">')
    + '<div class="sf-top-fade"></div><div class="sf-bot-fade"></div>'
    + '<div class="sf-info">'
    +   '<div class="sf-person"><div class="sf-avatar" style="background:'+sfColor(ph.personName)+'">'+sfInit(ph.personName)+'</div><span class="sf-person-name">'+ph.personName+'</span></div>'
    +   (ph.title ? '<div class="sf-title">'+ph.title+'</div>' : '')
    +   (ph.desc ? '<div class="sf-desc">'+ph.desc+'</div><div class="sf-see-more">more</div>' : '')
    +   (albName ? '<div class="sf-album">'+albName+'</div>' : '')
    +   (ph.year||ph.source ? '<div class="sf-meta">'+(ph.year||'')+(ph.year&&ph.source?' · ':'')+(ph.source||'')+'</div>' : '')
    + '</div>'
    + '<div class="sf-actions">'
    +   '<div class="sf-action"><button class="sf-btn'+(isLiked?' liked':'')+'" data-sf-like="'+ph.id+'">'+(isLiked?'❤️':'🤍')+'</button><span class="sf-alabel">'+(likes||'')+'</span></div>'
    + '</div>'
    // nav arrows
    + (i > 0 ? '<button class="sf-nav sf-nav-up" data-sfnav="up">↑</button>' : '')
    + (i < sfPhotos.length-1 ? '<button class="sf-nav sf-nav-down" data-sfnav="down">↓</button>' : '')
    + '</div>';
}

function sfSetupVideoAutoplay() {
  if (!window.IntersectionObserver) return;
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      var vid = e.target.querySelector('video');
      if (vid) { if (e.isIntersecting) vid.play().catch(function(){}); else vid.pause(); }
    });
  }, { threshold: 0.7 });
  document.querySelectorAll('.sf-slide').forEach(function(s){ obs.observe(s); });
}

// NAV ARROWS — use event delegation too
document.getElementById('sf-feed').addEventListener('click', function(e) {
  var navBtn = e.target.closest('[data-sfnav]');
  if (!navBtn) return;
  var dir = navBtn.getAttribute('data-sfnav');
  var idx = sfCurrentIdx + (dir === 'down' ? 1 : -1);
  idx = Math.max(0, Math.min(idx, sfPhotos.length-1));
  sfGoTo(idx);
});

function sfGoTo(idx) {
  sfCurrentIdx = idx;
  document.getElementById('sf-feed').scrollTo({ top: idx * window.innerHeight, behavior: 'smooth' });
  sfUpdateDots(idx);
  sfUpdateNav();
}

document.getElementById('sf-feed').addEventListener('scroll', function() {
  var idx = Math.round(this.scrollTop / window.innerHeight);
  if (idx !== sfCurrentIdx) { sfCurrentIdx = idx; sfUpdateDots(idx); sfUpdateNav(); }
}, { passive: true });

function sfUpdateNav() {
  // nothing needed — arrows are per-slide
}

function sfRenderDots() {
  var c = document.getElementById('sf-progress');
  var count = Math.min(sfPhotos.length, 10);
  c.innerHTML = Array.from({length:count}, function(_,i){ return '<div class="sf-dot" data-sfdot="'+i+'"></div>'; }).join('');
}
function sfUpdateDots(idx) {
  document.querySelectorAll('.sf-dot').forEach(function(d,i){ d.classList.toggle('active', i===Math.min(idx,9)); });
}

// LIKES
function sfToggleLike(photoId, btn) {
  var name = sfGetUsername(); if (!name) return;
  if (!sfSocial.likes[photoId]) sfSocial.likes[photoId] = [];
  var idx = sfSocial.likes[photoId].indexOf(name);
  if (idx === -1) {
    sfSocial.likes[photoId].push(name);
    btn.textContent = '❤️'; btn.classList.add('liked');
    showToast('❤️ Liked');
  } else {
    sfSocial.likes[photoId].splice(idx,1);
    btn.textContent = '🤍'; btn.classList.remove('liked');
  }
  sfSave();
  var label = btn.parentElement ? btn.parentElement.querySelector('.sf-alabel') : null;
  if (label) label.textContent = sfSocial.likes[photoId].length || '';
}

// KEYBOARD for feed
document.addEventListener('keydown', function(e) {
  if (!document.getElementById('social-feed-wrap').classList.contains('open')) return;
  if (e.key === 'ArrowDown' || e.key === 'ArrowRight') sfGoTo(Math.min(sfCurrentIdx+1, sfPhotos.length-1));
  if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') sfGoTo(Math.max(sfCurrentIdx-1, 0));
  if (e.key === 'Escape') document.getElementById('mode-archive').click();
});

// ── INIT
loadFromCloud(function(ok) {
  if (ok) { applyTheme(); renderSidebar(); renderMobileNav(); renderContent(); }
  else { applyTheme(); renderSidebar(); renderMobileNav(); renderContent(); }
});

</script>
</body>
